name: Aero Multiplier Snapshot

on:
  schedule:
    - cron: '5 0 * * *'   # 08:05 HKT
    - cron: '5 8 * * *'   # 16:05 HKT
    - cron: '5 16 * * *'  # 00:05 HKT
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Lightpanda
        run: |
          curl -L -o lightpanda \
            https://github.com/lightpanda-io/browser/releases/download/nightly/lightpanda-x86_64-linux
          chmod +x lightpanda
          sudo mv lightpanda /usr/local/bin/lightpanda

      - name: Install Python deps
        run: pip install gspread google-auth

      - name: Run snapshot
        env:
          AERO_TELEGRAM_BOT_TOKEN: ${{ secrets.AERO_TELEGRAM_BOT_TOKEN }}
          AERO_TELEGRAM_CHAT_ID: ${{ secrets.AERO_TELEGRAM_CHAT_ID }}
          AERO_CHANNEL_USERNAME: ${{ secrets.AERO_CHANNEL_USERNAME }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          bash aero-multiplier.sh
