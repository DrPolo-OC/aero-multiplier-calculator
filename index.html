<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aero Multiplier Calculator</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f0f0f;
      --fg: #e0e0e0;
      --accent: #4a90e2;
      --card: #1a1a1a;
      --border: #333;
      --success: #2e7d32;
      --warn: #c62828;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: var(--bg);
      color: var(--fg);
    }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .header h1 { margin: 0; font-size: 1.6em; }
    .theme-toggle { background: var(--card); border: 1px solid var(--border); color: var(--fg); padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    .status { margin-bottom: 20px; font-weight: bold; }
    .field { margin: 10px 0; }
    label { display: block; margin-bottom: 5px; }
    input[type="number"] { width: 100%; padding: 10px; font-size: 1em; box-sizing: border-box; background: var(--card); border: 1px solid var(--border); color: var(--fg); border-radius: 6px; }
    button { padding: 12px 24px; font-size: 1em; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 5px; }
    button:hover { opacity: 0.9; }
    .report { white-space: pre; font-family: 'SF Mono', 'Menlo', monospace; background: var(--card); padding: 15px; margin-top: 10px; font-size: 0.95em; line-height: 1.5; border: 1px solid var(--border); border-radius: 8px; overflow-x: auto; }
    .source { font-size: 0.9em; color: #aaa; margin-top: 10px; }
    .source a { color: var(--accent); text-decoration: none; }
    .source a:hover { text-decoration: underline; }
    .promo { background: var(--card); border: 1px dashed var(--accent); padding: 12px; margin: 15px 0; border-radius: 8px; text-align: center; }
    .promo a { color: var(--accent); font-weight: bold; text-decoration: none; }
    .promo a:hover { text-decoration: underline; }
    .chart { margin-top: 40px; background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
    .conditions { margin-top: 10px; font-size: 0.9em; }
    .user-result { margin-top: 15px; padding: 12px; background: rgba(74, 144, 226, 0.15); border-radius: 6px; border-left: 4px solid var(--accent); }
    .legend-note { font-size: 0.8em; color: #888; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Aero Emission Multiplier Calculator</h1>
    <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
  </div>

  <div class="promo">
    📢 Follow <a href="https://t.me/AeroEmissionMultiplier" target="_blank">@AeroEmissionMultiplier</a> on Telegram for daily updates
  </div>

  <div class="status" id="status">Loading latest data...</div>

  <div class="report" id="report"></div>
  <div class="source" id="source"></div>

  <div class="field">
    <label for="incentive">Add Incentive (USD)</label>
    <input type="number" id="incentive" placeholder="Enter additional incentives in USD" min="0" step="1000">
  </div>
  <button id="calcBtn">Calculate</button>

  <div class="conditions" id="conditions"></div>
  <div class="user-result" id="userResult" style="display:none;"></div>

  <div class="chart">
    <canvas id="multiplierChart"></canvas>
    <div class="legend-note">Orange line: your selected incentive | Red dashed: 1.1 threshold</div>
  </div>

  <script>
    const SHEET_ID = '1uL3qz2hD4ugLFh1i3_4CuZOzLuF_XL5UgRoUlX_JDq0';
    const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const SOURCE_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`;

    let latest = null;
    let chartInstance = null;

    function formatTelegramNumber(num, decimals) {
      if (num >= 1) {
        return num.toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
      }
      return num.toFixed(decimals);
    }

    function buildTelegramReport(data) {
      const ne = formatTelegramNumber(data.newEmissions, 2);
      const tr = formatTelegramNumber(data.totalRewards, 2);
      const price = formatTelegramNumber(data.price, 4);
      const ev = formatTelegramNumber(data.emissionsValue, 2);
      const mult = formatTelegramNumber(data.multiplier, 2);
      let msg = `📊 Aerodrome Multiplier Report — ${data.date}\n\nCurrent Stats:\n• New Emissions: ${ne} AERO\n• Total Rewards: $${tr}\n• AERO Price: $${price}\n• Emissions Value: $${ev}\n\n🎯 Current Multiplier: ${mult}×\n(Emission value ÷ Total Rewards)\n\n📈 Simulated Multipliers (added incentives):\n`;
      [1000, 25000, 50000, 100000].forEach(inc => {
        const sim = formatTelegramNumber(data.emissionsValue / (data.totalRewards + inc), 2);
        msg += ` +$${inc.toLocaleString()} → ${sim}×\n`;
      });
      msg += `\nNote: Adding incentives increases total rewards while emissions stay fixed, so multiplier decreases.`;
      return msg;
    }

    async function loadSheet() {
      try {
        const resp = await fetch(DATA_URL);
        const text = await resp.text();
        const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/)[1];
        const data = JSON.parse(jsonStr);
        const rows = data.table.rows;
        for (let i = rows.length - 1; i >= 0; i--) {
          const cells = rows[i].c;
          if (cells && cells.length >= 6) {
            const ts = cells[0] ? cells[0].v : null;
            const ne = parseFloat(cells[1] ? cells[1].v : '');
            const tr = parseFloat(cells[2] ? cells[2].v : '');
            const ap = parseFloat(cells[3] ? cells[3].v : '');
            const ev = parseFloat(cells[4] ? cells[4].v : '');
            const m = parseFloat(cells[5] ? cells[5].v : '');
            if (!isNaN(ne) && !isNaN(tr) && !isNaN(ap) && !isNaN(ev) && !isNaN(m)) {
              latest = { date: ts, newEmissions: ne, totalRewards: tr, price: ap, emissionsValue: ev, multiplier: m };
              break;
            }
          }
        }
        if (!latest) throw new Error('No data found');
        document.getElementById('status').textContent = `Latest data: ${latest.date}`;
        document.getElementById('report').textContent = buildTelegramReport(latest);
        document.getElementById('source').innerHTML = `Source: <a href="${SOURCE_URL}" target="_blank">Multiplier Log (Google Sheet)</a>`;
        initChart(null);
      } catch (e) {
        document.getElementById('status').textContent = 'Error loading sheet: ' + e.message;
        console.error(e);
      }
    }

    function initChart(selectedIncentive) {
      if (!latest) return;
      // Goal: find incentive where multiplier = 1.1 => inc = emissionsValue / 1.1 - totalRewards
      let targetInc = latest.emissionsValue / 1.1 - latest.totalRewards;
      if (targetInc < 0) targetInc = 200000; // fallback if already above 1.1 at zero
      // Round up to nearest 10k for a clean axis end
      const maxInc = Math.max(200000, Math.ceil(targetInc / 10000) * 10000);
      // Generate points every 2k for smoothness
      const points = [];
      for (let inc = 0; inc <= maxInc; inc += 2000) {
        const mult = latest.emissionsValue / (latest.totalRewards + inc);
        points.push({ x: inc, y: mult });
      }
      const ctx = document.getElementById('multiplierChart').getContext('2d');
      const datasets = [
        {
          label: 'Multiplier',
          data: points,
          borderColor: '#4a90e2',
          fill: false,
          pointRadius: 0,
          showLine: true
        },
        {
          label: '1.1 threshold',
          data: points.map(p => ({ x: p.x, y: 1.1 })),
          borderColor: '#ff6b6b',
          borderDash: [5, 5],
          pointRadius: 0,
          showLine: true
        }
      ];
      if (selectedIncentive != null && !isNaN(selectedIncentive)) {
        const m = latest.emissionsValue / (latest.totalRewards + selectedIncentive);
        datasets.push({
          label: `Your incentive: $${selectedIncentive.toLocaleString()}`,
          data: [{ x: selectedIncentive, y: 1.0 }, { x: selectedIncentive, y: 2.0 }],
          borderColor: '#f5a623',
          borderDash: [3, 3],
          pointRadius: 0,
          showLine: true,
          segment: { borderColor: '#f5a623' }
        });
      }
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: { datasets: datasets },
        options: {
          responsive: true,
          plugins: {
            tooltip: {
              callbacks: {
                label: ctx => {
                  const { x, y } = ctx.raw;
                  if (ctx.dataset.label.includes('Your incentive')) {
                    return `Incentive: $${x.toLocaleString()} → Multiplier: ${y.toFixed(4)}`;
                  }
                  return `Incentive: $${x.toLocaleString()} → Multiplier: ${y.toFixed(4)}`;
                }
              }
            },
            legend: { position: 'top', labels: { color: '#e0e0e0' } }
          },
          scales: {
            x: {
              type: 'linear',
              title: { display: true, text: 'Incentive (USD)', color: '#e0e0e0' },
              min: 0,
              max: maxInc,
              ticks: {
                stepSize: Math.ceil(maxInc / 5 / 10000) * 10000,
                callback: v => '$' + v.toLocaleString(),
                color: '#e0e0e0'
              },
              grid: { color: '#333' }
            },
            y: {
              title: { display: true, text: 'Multiplier', color: '#e0e0e0' },
              min: 1.0,
              max: 2.0,
              ticks: { color: '#e0e0e0' },
              grid: { color: '#333' }
            }
          }
        }
      });
    }

    function calculate() {
      if (!latest) {
        alert('Data not loaded yet.');
        return;
      }
      const inc = parseFloat(document.getElementById('incentive').value);
      if (isNaN(inc) || inc < 0) {
        alert('Enter a valid incentive amount');
        return;
      }
      const totalWithInc = latest.totalRewards + inc;
      const mult = latest.emissionsValue / totalWithInc;
      const multFmt = formatTelegramNumber(mult, 2);
      const evFmt = formatTelegramNumber(latest.emissionsValue, 2);
      const trFmt = formatTelegramNumber(totalWithInc, 2);
      const userHtml = `
        <strong>With $${inc.toLocaleString()} added:</strong><br>
        Emissions Value: $${evFmt}<br>
        Total Rewards + Incentive: $${trFmt}<br>
        <strong>Multiplier: ${multFmt}×</strong>
      `;
      document.getElementById('userResult').innerHTML = userHtml;
      if (mult < 1.1) {
        document.getElementById('conditions').innerHTML = '<p style="color: #ff6b6b;">⚠️ Multiplier below 1.1 is considered meaningless — no one would incentivize at this level.</p>';
      } else {
        document.getElementById('conditions').innerHTML = '<p style="color: #4caf50;">✅ Multiplier is above the 1.1 threshold.</p>';
      }
      initChart(inc);
    }

    document.getElementById('calcBtn').addEventListener('click', calculate);
    loadSheet();
  </script>
</body>
</html>
